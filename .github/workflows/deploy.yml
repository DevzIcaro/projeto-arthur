name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      -name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8 

      - name: Install, build, and upload
        uses: withastro/action@v3
        with:
          path: .
          package-manager: pnpm@8
